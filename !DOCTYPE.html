    <!-- JavaScript 交互逻辑 -->
    <script>
        // Tab 切换逻辑
        function switchTab(tab) {
            const vIdentify = document.getElementById('view-identify');
            const vGarden = document.getElementById('view-garden');
            const tIdentify = document.getElementById('tab-identify');
            const tGarden = document.getElementById('tab-garden');

            // 隐藏详情页(如果打开着)
            closeDetail();

            if (tab === 'identify') {
                vIdentify.classList.remove('hidden');
                vGarden.classList.add('hidden');
                
                tIdentify.classList.replace('text-gray-400', 'text-green-600');
                tGarden.classList.replace('text-green-600', 'text-gray-400');
            } else {
                vIdentify.classList.add('hidden');
                vGarden.classList.remove('hidden');
                
                tGarden.classList.replace('text-gray-400', 'text-green-600');
                tIdentify.classList.replace('text-green-600', 'text-gray-400');
                
                // 切换到花草苑时刷新数据
                loadGardenPlants();
            }
        }

        // Supabase 配置
        const supabaseUrl = 'https://puxfddsmsjxeorjiovbb.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1eGZkZHNtc2p4ZW9yamlvdmJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMTExNzAsImV4cCI6MjA5Mzc4NzE3MH0.55nNn85QiRpWfE1wcnEoCl9yW70jdCkCg3JL5J-QbKk';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        // 全局变量存储当前图片数据
        let currentImageData = null;
        let currentPlantData = null;
        let currentBase64Data = null;
        
        // 加载消息轮播相关变量
        let loadingMessageInterval = null;
        let currentMessageIndex = 0;
        const loadingMessages = [
            '正在连线植物学家...',
            '翻阅植物图鉴中...',
            '发现有趣的叶片纹理...',
            '分析花瓣形状特征...',
            '匹配植物数据库...',
            '识别生长环境特征...'
        ];

        // 初始化文件上传事件
        document.addEventListener('DOMContentLoaded', function() {
            const uploadBox = document.getElementById('upload-box');
            const fileInput = document.getElementById('file-input');
            
            // 点击上传框触发文件选择
            uploadBox.addEventListener('click', function() {
                fileInput.click();
            });
            
            // 文件选择事件
            fileInput.addEventListener('change', handleFileSelect);
            
            // 初始化加载花草苑数据
            loadGardenPlants();
        });

        // 压缩图片函数
        function compressImage(file, maxWidth = 600, maxHeight = 600, quality = 0.6) {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const img = new Image();
                
                img.onload = function() {
                    // 恢复画质：将长边缩放到指定尺寸
                    let { width, height } = img;
                    
                    // 计算缩放比例，确保长边不超过指定尺寸
                    const ratio = Math.min(maxWidth / width, maxHeight / height, 1);
                    width *= ratio;
                    height *= ratio;
                    
                    // 设置 canvas 尺寸
                    canvas.width = width;
                    canvas.height = height;
                    
                    // 绘制压缩后的图片
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // 转换为 Base64，使用WebP格式实现极致压缩
                    const compressedDataUrl = canvas.toDataURL('image/webp', quality);
                    resolve(compressedDataUrl);
                };
                
                img.src = URL.createObjectURL(file);
            });
        }

        // 处理文件选择
        async function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            // 验证文件类型
            if (!file.type.startsWith('image/')) {
                showToast('请选择图片文件！', 'error');
                return;
            }
            
            try {
                // 压缩图片
                const compressedDataUrl = await compressImage(file);
                currentImageData = compressedDataUrl; // 保留压缩后的 data URL 用于显示
                
                // 提取纯 Base64 数据（去掉 data:image/...;base64, 前缀）
                const base64Data = compressedDataUrl.split(',')[1];
                currentBase64Data = base64Data;
                
                startPlantIdentification(base64Data);
            } catch (error) {
                console.error('图片压缩失败:', error);
                showToast('图片处理失败，请重试！', 'error');
            }
        }

        // 开始植物识别（带自动重试）
        async function startPlantIdentification(base64Data, retryCount = 0) {
            const uploadBox = document.getElementById('upload-box');
            const scanningBox = document.getElementById('scanning-box');
            
            // 隐藏上传框，显示扫描动画
            uploadBox.classList.add('hidden');
            scanningBox.classList.remove('hidden');
            
            // 启动加载消息轮播
            startLoadingMessages();
            
            try {
                // 实时检测：检查 Base64 字符长度
                console.log('准备发送的Base64字符长度:', base64Data.length);
                
                // 标准检查：如果长度超过 50,000，不允许发送
                if (base64Data.length > 50000) {
                    throw new Error(`图片数据过大（${base64Data.length} 字符），请重新选择更小的图片或等待系统优化`);
                }
                
                // 彻底去前缀：确保传给 RPC 的字符串绝对不包含 data:image 前缀
                const cleanBase64 = base64Data.replace(/^data:image\/[a-z]+;base64,/, '');
                console.log('清理后的Base64长度:', cleanBase64.length);
                
                // 创建带超时的 RPC 调用
                const timeoutPromise = new Promise((_, reject) => {
                    setTimeout(() => reject(new Error('识别超时')), 15000);
                });
                
                const rpcPromise = supabaseClient.rpc('identify_plant_sql', {
                    image_base64: cleanBase64
                });
                
                // 使用 Promise.race 实现超时控制
                const { data, error } = await Promise.race([
                    rpcPromise,
                    timeoutPromise.then(() => {
                        throw new Error('识别超时，请稍后重试');
                    })
                ]);
                
                if (error) {
                    throw new Error(`植物识别失败: ${error.message}`);
                }
                
                // 处理纯文本响应
                console.log('SQL函数返回的原始数据:', data);
                
                // 智能解析机制：检查错误标识
                if (data.includes('ERROR_HTTP') || data.includes('ERROR_SQL')) {
                    throw new Error(data);
                }
                
                // 正则清理逻辑：移除markdown标记
                let cleanText = data.replace(/```json/gi, '').replace(/```/g, '').trim();
                console.log('清理后的文本:', cleanText);
                
                // 防御性JSON解析
                let plantInfo;
                try {
                    plantInfo = JSON.parse(cleanText);
                    console.log('解析成功的植物信息:', plantInfo);
                } catch (parseError) {
                    console.error('JSON解析失败:', parseError);
                    console.error('原始数据:', data);
                    // 提供保底对象
                    plantInfo = {
                        name: "未知植物",
                        english_name: "",
                        flowering_period: "请补充",
                        meaning: "请补充",
                        trivia: "请补充"
                    };
                    console.log('使用保底植物信息:', plantInfo);
                }
                
                // 存储解析后的植物信息
                currentPlantData = plantInfo;
                
                // 停止加载消息轮播
                stopLoadingMessages();
                
                // 显示识别结果
                showResultModal();
                
            } catch (error) {
                console.error('植物识别错误:', error);
                
                // 自动重试机制
                if (retryCount === 0) {
                    console.log('第一次失败，1秒后自动重试...');
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    return startPlantIdentification(base64Data, retryCount + 1);
                }
                
                // 停止加载消息轮播
                stopLoadingMessages();
                
                // 第二次失败，显示友好错误提示
                const friendlyMessage = getFriendlyErrorMessage(error.message);
                showToast(friendlyMessage, 'error');
                
                // 恢复上传框
                scanningBox.classList.add('hidden');
                uploadBox.classList.remove('hidden');
            }
        }

        // 启动加载消息轮播
        function startLoadingMessages() {
            currentMessageIndex = 0;
            updateLoadingMessage();
            loadingMessageInterval = setInterval(updateLoadingMessage, 1500);
        }

        // 更新加载消息
        function updateLoadingMessage() {
            const messageElement = document.querySelector('#scanning-box .absolute.bottom-4');
            if (messageElement) {
                messageElement.textContent = loadingMessages[currentMessageIndex];
                currentMessageIndex = (currentMessageIndex + 1) % loadingMessages.length;
            }
        }

        // 停止加载消息轮播
        function stopLoadingMessages() {
            if (loadingMessageInterval) {
                clearInterval(loadingMessageInterval);
                loadingMessageInterval = null;
            }
        }

        // 显示Toast提示
        function showToast(message, type = 'error') {
            // 移除已存在的toast
            const existingToast = document.getElementById('toast-notification');
            if (existingToast) {
                existingToast.remove();
            }

            // 创建toast元素
            const toast = document.createElement('div');
            toast.id = 'toast-notification';
            toast.className = `fixed top-4 left-1/2 transform -translate-x-1/2 z-50 px-6 py-3 rounded-full shadow-lg transition-all duration-300 ${
                type === 'error' ? 'bg-red-500 text-white' : 'bg-green-500 text-white'
            }`;
            toast.textContent = message;

            // 添加到页面
            document.body.appendChild(toast);

            // 3秒后自动消失
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

            } else if (originalError.includes('过大')) {
                return '图片有点大哦，请选择一张小一点的照片试试～';
            } else if (originalError.includes('ERROR_HTTP') || originalError.includes('ERROR_SQL')) {
                return '植物专家正在休息，请稍后再来认识这株植物～';
            } else {
                return '这株植物太害羞了，请换个角度再试一次～';
            }

        // 存入花草苑
        async function saveToGarden() {
            if (!currentPlantData || !currentBase64Data) {
                showToast('没有可保存的植物数据！', 'error');
                return;
            }
            
            try {
                // 获取用户输入的数据
                const location = document.getElementById('modal-location').value.trim();
                const notes = document.getElementById('modal-notes').value.trim();
                
                // 1. 将 Base64 数据转换为 Blob
                const base64Response = await fetch(`data:image/jpeg;base64,${currentBase64Data}`);
                const blob = await base64Response.blob();
                
                // 2. 生成唯一的文件名（避免中文和特殊字符）
                const fileName = `${Date.now()}.jpg`;
                
                // 3. 上传图片到 Supabase Storage
                const { data: uploadData, error: uploadError } = await supabaseClient.storage
                    .from('flower-gallery')
                    .upload(fileName, blob, {
                        contentType: 'image/jpeg',
                        cacheControl: '3600',
                        upsert: false
                    });
                
                if (uploadError) {
                    throw new Error(`图片上传失败: ${uploadError.message}`);
                }
                
                // 4. 获取图片的公共 URL
                const { data: { publicUrl } } = supabaseClient.storage
                    .from('flower-gallery')
                    .getPublicUrl(fileName);
                
                // 5. 第一步：保存植物信息到 flower_plants 表
                const { data: plantData, error: insertError } = await supabaseClient
                    .from('flower_plants')
                    .insert({
                        name: currentPlantData.name || '未知植物',
                        english_name: currentPlantData.english_name || '',
                        flowering_period: currentPlantData.flowering_period || '未知',
                        meaning: currentPlantData.meaning || '未知',
                        trivia: currentPlantData.trivia || '未知',
                        location: location || '',
                        image_url: publicUrl,
                        created_at: new Date().toISOString()
                    })
                    .select()
                    .single();
                
                if (insertError) {
                    throw new Error(`植物数据保存失败: ${insertError.message}`);
                }
                
                console.log('植物数据保存成功:', plantData);
                
                // 6. 第二步：如果用户填了随笔，保存到 flower_stories 表
                if (notes) {
                    const { data: storyData, error: storyError } = await supabaseClient
                        .from('flower_stories')
                        .insert({
                            plant_id: plantData.id,
                            content: notes,
                            image_url: publicUrl,
                            created_at: new Date().toISOString()
                        })
                        .select()
                        .single();
                    
                    if (storyError) {
                        console.error('随笔保存失败:', storyError);
                    } else {
                        console.log('随笔保存成功:', storyData);
                    }
                }
                
                showToast('成功存入花草苑！', 'success');
                
                // 关闭弹窗
                closeModal();
                
                // 切换到花草苑 Tab
                switchTab('garden');
                
                // 刷新花草苑页面显示新添加的植物
                loadGardenPlants();
                
            } catch (error) {
                console.error('保存失败:', error);
                showToast('保存失败，请重试：' + error.message, 'error');
            }
        }

                        .getPublicUrl(fileName);
                    
                    imageUrl = publicUrl;

                    .select()
                    .single();
                
                if (storyError) {
                    throw new Error(`随笔保存失败: ${storyError.message}`);
                }
                
                showToast('随笔已保存', 'success');
                
                // 关闭弹窗并刷新故事
                closeWriteStoryModal();
                loadPlantStories(currentPlantId);
                
            } catch (error) {
                console.error('保存随笔失败:', error);
                showToast('保存随笔失败', 'error');
            }
        }

        // 关闭详情页
        function closeDetail() {
            document.getElementById('view-detail').classList.add('hidden');
        }
    </script>
</body>
</html>
