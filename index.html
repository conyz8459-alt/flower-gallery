        // 压缩图片函数
        function compressImage(file, maxWidth = 600, maxHeight = 600, quality = 0.6) {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const img = new Image();
                
                img.onload = function() {
                    // 恢复画质：将长边缩放到指定尺寸
                    let { width, height } = img;
                    
                    // 计算缩放比例，确保长边不超过指定尺寸
                    const ratio = Math.min(maxWidth / width, maxHeight / height, 1);
                    width *= ratio;
                    height *= ratio;
                    
                    // 设置 canvas 尺寸
                    canvas.width = width;
                    canvas.height = height;
                    
                    // 绘制压缩后的图片
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // 转换为 Base64，使用WebP格式实现极致压缩
                    const compressedDataUrl = canvas.toDataURL('image/webp', quality);
                    resolve(compressedDataUrl);
                };
                
                img.src = URL.createObjectURL(file);
            });
        }

        // 处理文件选择
        async function handleFileSelect(event) {
            const file = event.target.files[0];

            try {
                // 1. 压缩图片 (保持画质)
                const compressedDataUrl = await compressImage(file, 1024, 1024, 0.8);
                const blob = await (await fetch(compressedDataUrl)).blob();
                
                // 2. 先把照片存到你的 Supabase 桶里
                const fileName = `temp_${Date.now()}.jpg`;
                const { data: uploadData, error: uploadError } = await supabaseClient.storage
                    .from('flower-gallery')
                    .upload(fileName, blob);

                if (uploadError) throw new Error(`图片上传失败: ${uploadError.message}`);

                // 3. 获取图片的公网 URL
                const { data: { publicUrl } } = supabaseClient.storage
                    .from('flower-gallery')
                    .getPublicUrl(fileName);
                
                // 【重点】把 URL 记下来，留给后面“存入花草苑”使用
                window.currentUploadedUrl = publicUrl; 

                // 4. 前端直接呼叫千问大模型 (绕过 Supabase 超时限制)
                const response = await fetch(AI_API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${AI_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'qwen3.5-omni-flash',
                        messages:[
                            {
                                role: 'user',
                                content:[
                                    {
                                        type: 'text',
                                        text: 'text: 你是一位隐居山林、对自然万物充满温情的植物学家。请识别图中最中心、最主要的植物。请严格按照以下 JSON 格式输出，严禁任何 markdown 标签（如 ```json）或解释说明。格式如下，"name": "准确的中文名称，若有常用的雅致别名可标注在括号内，小众的就算了（如：虞美人）","english_name": "常用的英文通用名","flowering_period": "若是花，写具体月份；若是观叶/树木，写最美观赏季（如：夏天赏绿叶，秋天赏黄叶；四季常青），禁止使用文绉绉的术语","meaning": "该植物在文化中准确的寓意或象征，用简单词语或短句概括，要求简洁、独特、准确、好理解（如朱砂梅寓意：坚韧不拔，高洁清雅；玫瑰寓意：爱情，尊重与优雅）","trivia": "50字内趣味点。可以是独特的生存策略、命名背后的历史瞬间、或植物学怪癖。拒绝平庸的养护建议，可以联系诗词、典故、外国故事等等，要像讲故事一样有温度。要求：句子可以稍微长一些，保证可读性；同时保证准确性，不可出现虚假编造或错误内容"。 【核心准则】：1.去噪与聚焦：若图中有多株植物，仅识别视觉中心最突出的主体。2.拒绝幻觉：若图中主体植物特征模糊或无法确定，name 字段请返回“某种[类别]（待鉴定）”，并在 trivia 中注明理由。3. 精准命名：name 字段仅输出该植物最核心的名字，严禁为了“科普”而带入易混淆植物（例如：绝对禁止写成“芍药（牡丹）”或“蔷薇（月季）”）。4.语调要求：文字需洗练、充满对自然的敬畏感，避免机械化、说明书式的陈述。'
                                    },
                                    {
                                        type: 'image_url',
                                        image_url: { url: publicUrl }
                                    }
                                ]
                            }
                        ]
                    })
                });

                if (!response.ok) {
                    throw new Error(`AI 服务异常，状态码: ${response.status}`);
                }

                // 5. 拿到 AI 的原话
                const resultData = await response.json();
                const aiReply = resultData.choices[0].message.content;

                // 6. 解析 JSON（清洗多余的 markdown 符号）
                let cleanText = aiReply.replace(/```json/gi, '').replace(/```/g, '').trim();
                let plantInfo;
                try {
                    plantInfo = JSON.parse(cleanText);
                } catch (e) {
                    console.error("解析失败的原文:", cleanText);
                    plantInfo = { name: "未知植物", english_name: "", flowering_period: "请补充", meaning: "请补充", trivia: "AI开小差了，可手动修改名字" };
                }

                currentPlantData = plantInfo;
                currentImageData = compressedDataUrl; 
                
                stopLoadingMessages();
                showResultModal();

            } catch (error) {
                console.error('识别失败:', error);
                stopLoadingMessages();
                showToast(getFriendlyErrorMessage(error.message));
                scanningBox.classList.add('hidden');
                uploadBox.classList.remove('hidden');
            }
        }

                currentMessageIndex = (currentMessageIndex + 1) % loadingMessages.length;

        // 显示Toast提示
        function showToast(message, type = 'error') {
            // 移除已存在的toast
            const existingToast = document.getElementById('toast-notification');
            if (existingToast) {
                existingToast.remove();
            }

            // 创建toast元素
            const toast = document.createElement('div');
            toast.id = 'toast-notification';
            toast.className = `fixed top-4 left-1/2 transform -translate-x-1/2 z-50 px-6 py-3 rounded-full shadow-lg transition-all duration-300 ${
                type === 'error' ? 'bg-red-500 text-white' : 'bg-green-500 text-white'
            }`;
            toast.textContent = message;

            // 添加到页面
            document.body.appendChild(toast);

            // 3秒后自动消失
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);

                return '图片有点大哦，请选择一张小一点的照片试试～';

        // 存入花草苑

        async function saveToGarden() {
            // 检查有没有刚才上传好的图片 URL
            if (!currentPlantData || !window.currentUploadedUrl) {
                showToast('数据不完整，请重新识别', 'error');
                return;
            }
            
            try {
                const location = document.getElementById('modal-location').value.trim();
                const notes = document.getElementById('modal-notes').value.trim();
                
                // 拿到用户可能修改过的新名字

                // 存入植物基础表
                const { data: plantData, error: insertError } = await supabaseClient
                    .from('flower_plants')
                    .insert({
                        name: finalName || '未知植物',
                        english_name: currentPlantData.english_name || '',
                        flowering_period: currentPlantData.flowering_period || '未知',
                        meaning: currentPlantData.meaning || '未知',

                        image_url: window.currentUploadedUrl,
                        created_at: new Date().toISOString()
                    });

        // 打开植物详情页

            // 填充植物信息

            document.getElementById('detail-flowering-period').innerHTML = plant.flowering_period ? `<strong>观赏期：</strong>${plant.flowering_period}` : '';
            document.getElementById('detail-meaning').innerHTML = plant.meaning ? `<strong>寓意：</strong>${plant.meaning}` : '';

        // 更换植物图片
        async function changePlantImage() {
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = 'image/*';
            fileInput.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                try {
                    // 获取当前植物ID
                    const currentPlantId = document.getElementById('detail-plant-name').getAttribute('data-plant-id');
                    if (!currentPlantId) {
                        throw new Error('无法获取植物ID');
                    }
                    
                    // 压缩图片
                    const compressedDataUrl = await compressImage(file);
                    const base64Data = compressedDataUrl.split(',')[1];
                    
                    // 上传新图片
                    const fileName = `${Date.now()}.jpg`;
                    const base64Response = await fetch(`data:image/jpeg;base64,${base64Data}`);
                    const blob = await base64Response.blob();
                    
                    const { data: uploadData, error: uploadError } = await supabaseClient.storage
                        .from('flower-gallery')
                        .upload(fileName, blob, {
                            contentType: 'image/jpeg',
                            cacheControl: '3600',
                            upsert: false
                        });
                    
                    if (uploadError) {
                        throw new Error(`图片上传失败: ${uploadError.message}`);
                    }
                    
                    const { data: { publicUrl } } = supabaseClient.storage
                        .from('flower-gallery')
                        .getPublicUrl(fileName);
                    
                    // 更新数据库中的图片URL
                    const { data: updateData, error: updateError } = await supabaseClient
                        .from('flower_plants')
                        .update({ image_url: publicUrl })
                        .eq('id', currentPlantId)
                        .select()
                        .single();
                    
                    if (updateError) {
                        throw new Error(`图片更新失败: ${updateError.message}`);
                    }
                    
                    console.log('图片更新成功:', updateData);
                    
                    // 更新页面显示
                    document.getElementById('detail-plant-image').src = publicUrl;
                    showToast('图片已更新', 'success');
                    
                    // 刷新花园视图以显示新图片
                    loadGardenPlants();
                    
                } catch (error) {
                    console.error('更换图片失败:', error);
                    showToast('更换图片失败: ' + error.message, 'error');
                }
            };
            
            fileInput.click();
        }

                    .order('created_at', { ascending: false });

                // 渲染故事时间轴

        // 渲染故事时间轴
        function renderStoriesTimeline(stories) {
            const timeline = document.getElementById('stories-timeline');
            if (!timeline) return;
            
            // 清空现有内容
            timeline.innerHTML = '';
            
            if (stories.length === 0) {
                timeline.innerHTML = `
                    <div class="text-center text-gray-500 py-8">
                        <i class="fa-solid fa-book-open text-2xl mb-4"></i>
                        <p>还没有故事，点击上方按钮写下第一个故事吧～</p>
                    </div>
                `;
                return;
            }
            
            // 生成故事卡片
            stories.forEach((story, index) => {
                const storyCard = document.createElement('div');
                storyCard.className = 'relative pl-6';
                
                const date = new Date(story.created_at);
                const isToday = date.toDateString() === new Date().toDateString();
                
                storyCard.innerHTML = `
                    <div class="absolute -left-[9px] top-1 w-4 h-4 ${isToday ? 'bg-green-500' : 'bg-green-300'} rounded-full border-4 border-white shadow-sm"></div>
                    <div class="flex justify-between items-center mb-1">
                        <p class="text-xs text-gray-400">${isToday ? '今天' : date.toLocaleDateString()}</p>
                        <!-- 新增：编辑和删除按钮 -->
                        <div class="flex gap-3">
                            <button onclick="editStory('${story.id}', \`${story.content.replace(/`/g, "'")}\`, '${story.plant_id}')" class="text-gray-300 hover:text-green-500 transition"><i class="fa-solid fa-pen text-xs"></i></button>
                            <button onclick="deleteStory('${story.id}', '${story.plant_id}')" class="text-gray-300 hover:text-red-500 transition"><i class="fa-solid fa-trash text-xs"></i></button>
                        </div>
                    </div>
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 group">
                        <p class="text-sm text-gray-700 leading-relaxed mb-3 whitespace-pre-wrap">${story.content}</p>
                        ${story.image_url ? `<img src="${story.image_url}" class="rounded-xl w-32 h-32 object-cover">` : ''}
                    </div>
                `;
                
                timeline.appendChild(storyCard);
            });
        }

        // 打开详情页
        function openDetail() {
            document.getElementById('view-detail').classList.remove('hidden');
        }

        // 打开写随笔弹窗
        function openWriteStoryModal() {
            document.getElementById('write-story-modal').classList.remove('hidden');
            // 清空输入框
            document.getElementById('story-content').value = '';
            document.getElementById('story-image').value = '';
        }

        // 关闭写随笔弹窗
        function closeWriteStoryModal() {
            document.getElementById('write-story-modal').classList.add('hidden');
        }

        // 保存随笔
        async function saveStory() {
            const content = document.getElementById('story-content').value.trim();
            const imageFile = document.getElementById('story-image').files[0];
            
            if (!content) {
                showToast('请输入随笔内容', 'error');
                return;
            }
            
            try {
                let imageUrl = null;
                
                // 如果有图片，先上传
                if (imageFile) {
                    const compressedDataUrl = await compressImage(imageFile);
                    const base64Data = compressedDataUrl.split(',')[1];
                    
                    const fileName = `${Date.now()}.jpg`;
                    const base64Response = await fetch(`data:image/jpeg;base64,${base64Data}`);
                    const blob = await base64Response.blob();
                    
                    const { data: uploadData, error: uploadError } = await supabaseClient.storage
                        .from('flower-gallery')
                        .upload(fileName, blob, {
                            contentType: 'image/jpeg',
                            cacheControl: '3600',
                            upsert: false
                        });
                    
                    if (uploadError) {
                        throw new Error(`图片上传失败: ${uploadError.message}`);
                    }
                    
                    const { data: { publicUrl } } = supabaseClient.storage
                        .from('flower-gallery')
                        .getPublicUrl(fileName);
                    
                    imageUrl = publicUrl;
                }
                
                // 获取当前植物ID
                const currentPlantId = document.getElementById('detail-plant-name').getAttribute('data-plant-id');
                
                // 保存到 flower_stories 表
                const { data: storyData, error: storyError } = await supabaseClient
                    .from('flower_stories')
                    .insert({
                        plant_id: currentPlantId,
                        content: content,
                        image_url: imageUrl,
                        created_at: new Date().toISOString()
                    })
                    .select()
                    .single();
                
                if (storyError) {
                    throw new Error(`随笔保存失败: ${storyError.message}`);
                }
                
                showToast('随笔已保存', 'success');
                
                // 关闭弹窗并刷新故事
                closeWriteStoryModal();
                loadPlantStories(currentPlantId);
                
            } catch (error) {
                console.error('保存随笔失败:', error);
                showToast('保存随笔失败', 'error');
            }
        }

        // 关闭详情页
        function closeDetail() {
            document.getElementById('view-detail').classList.add('hidden');
        }

        // 动态删除随笔
        async function deleteStory(storyId, plantId) {
            if(!confirm('确定要删除这条记录吗？')) return;
            try {
                const { error } = await supabaseClient.from('flower_stories').delete().eq('id', storyId);
                if(error) throw error;
                showToast('随笔已删除', 'success');
                loadPlantStories(plantId); // 实时无刷新更新时间轴
            } catch (err) {
                showToast('删除失败: ' + err.message);
            }
        }

        // 动态编辑随笔
        async function editStory(storyId, oldContent, plantId) {
            const newContent = prompt('修改你的随笔：', oldContent);
            if (newContent === null || newContent.trim() === oldContent || newContent.trim() === '') return;
            try {
                const { error } = await supabaseClient.from('flower_stories').update({ content: newContent.trim() }).eq('id', storyId);
                if(error) throw error;
                showToast('随笔已更新', 'success');
                loadPlantStories(plantId); // 实时无刷新更新时间轴
            } catch (err) {
                showToast('更新失败: ' + err.message);
            }
        }

    </script>
</body>
</html>
